name: Publish to MCP Registry

# Publishes server.json to https://registry.modelcontextprotocol.io on each
# version tag (e.g. v1.5.3). The matching parseur-py release must already be on
# PyPI with the `mcp-name` marker in its README, since the registry validates
# package ownership against PyPI.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for GitHub OIDC authentication
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Sync server.json version with the release tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          jq --arg v "$version" '.version = $v | .packages[0].version = $v' \
            server.json > server.json.tmp && mv server.json.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate with the registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish
        run: ./mcp-publisher publish
